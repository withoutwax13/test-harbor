services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testharbor}
      POSTGRES_USER: ${POSTGRES_USER:-testharbor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testharbor}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testharbor} -d ${POSTGRES_DB:-testharbor}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: ${API_PORT:-4000}
      DATABASE_URL: postgres://testharbor:testharbor@postgres:5432/testharbor
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: ${WEB_PORT:-3000}
      API_BASE_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

  ingest:
    build:
      context: .
      dockerfile: apps/ingest/Dockerfile
    environment:
      PORT: ${INGEST_PORT:-4010}
      DATABASE_URL: postgres://testharbor:testharbor@postgres:5432/testharbor
    ports:
      - "4010:4010"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      PORT: ${WORKER_PORT:-4020}
      DATABASE_URL: postgres://testharbor:testharbor@postgres:5432/testharbor
      REDIS_URL: redis://redis:6379
    ports:
      - "4020:4020"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
